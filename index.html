<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rouler-O-Vert - GEO & Schema.org Knowledge Graph Visualizer</title>
    <style>
        .vis-network { position: relative; padding: 0; margin: 0; width: 100%; height: 100%; }
        
        :root {
            --rov-green: #00824A;
            --rov-accent: #10B981;
            --bg-light: #F4F7F5;
            --bg-white: #FFFFFF;
            --text-dark: #111827;
            --text-muted: #4B5563;
            --border-color: #E5E7EB;
            --graph-bg: #F9FAFB;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Public Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 300px;
            background-color: var(--bg-white);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 5px rgba(0,0,0,0.02);
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 2px solid var(--rov-green);
        }

        .sidebar-header img {
            height: 35px;
            display: block;
        }

        .sidebar-header p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 8px;
            font-weight: 500;
        }

        .url-list { list-style: none; overflow-y: auto; flex: 1; padding: 15px 10px; }

        .url-item {
            padding: 14px 16px;
            cursor: pointer;
            margin-bottom: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-dark);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.15s ease-in-out;
            border-left: 3px solid transparent;
        }

        .url-item:hover {
            background-color: #E8F5E9;
            color: var(--rov-green);
            border-left-color: #A5D6A7;
        }

        .url-item.active {
            background-color: #D1E7DD;
            color: var(--rov-green);
            font-weight: 700;
            border-left-color: var(--rov-green);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background-color: var(--bg-light);
        }

        .toolbar {
            height: 70px;
            background-color: var(--bg-white);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            z-index: 10;
        }

        .page-title { font-size: 0.95rem; font-weight: 700; color: var(--rov-green); }

        .view-toggle { display: flex; background-color: var(--bg-light); padding: 3px; border: 1px solid var(--border-color); }

        .toggle-btn {
            background: none; border: none; color: var(--text-muted); padding: 8px 16px;
            font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em;
            cursor: pointer; transition: all 0.15s;
        }

        .toggle-btn.active { background-color: var(--rov-green); color: var(--bg-white); }

        .view-container { flex: 1; position: relative; }

        .view-pane { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: none; }

        .view-pane.active { display: block; }

        #graph-canvas {
            background-color: var(--graph-bg);
            background-image: linear-gradient(var(--border-color) 1px, transparent 1px),
                              linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        #network-holder { width: 100%; height: 100%; }

        .inspector-panel {
            position: absolute; right: 24px; top: 24px; width: 340px;
            background-color: var(--bg-white); border-top: 4px solid var(--rov-accent);
            border-left: 1px solid var(--border-color); border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color); padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); pointer-events: auto; z-index: 5;
        }

        .inspector-title {
            font-size: 0.85rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em;
            color: var(--rov-green); margin-bottom: 14px; border-bottom: 1px solid var(--border-color); padding-bottom: 6px;
        }

        .scalar-properties { font-size: 0.85rem; }

        .scalar-row { display: flex; padding: 8px 0; border-bottom: 1px dashed var(--border-color); }

        .scalar-row:last-child { border-bottom: none; }

        .scalar-key { color: var(--text-muted); width: 35%; font-weight: 600; }

        .scalar-value { color: var(--text-dark); width: 65%; font-weight: 500; word-break: break-word; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/standalone/umd/vis-network.min.js"></script>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <img src="logos/rouler-o-vert.svg" alt="Rouler-O-Vert">
            <p>Visualisation de l'écosystème</p>
        </div>
        <ul class="url-list">
            <li class="url-item active" id="sidebar-links" onclick="switchDataset('links')">Profil de liens SEO</li>
            <li class="url-item" id="sidebar-partners" onclick="switchDataset('partners')">Partenaires SEO</li>
        </ul>
    </div>

    <div class="main-content">
        <div class="toolbar">
            <div class="page-title" id="current-url">Site cible : https://rouler-o-vert.green</div>
            <div class="view-toggle">
                <button class="toggle-btn active" id="btn-links" onclick="switchDataset('links')">Profil de liens SEO</button>
                <button class="toggle-btn" id="btn-partners" onclick="switchDataset('partners')">Partenaires SEO</button>
            </div>
        </div>

        <div class="view-container">
            <div id="graph-canvas" class="view-pane active">
                <div id="network-holder"></div>

                <div class="inspector-panel">
                    <div class="inspector-title" id="node-title">Entité sélectionnée</div>
                    <div class="scalar-properties" id="inspector-content">
                        <div class="text-muted" style="font-size: 0.85rem; font-style: italic;">Cliquez sur un nœud pour inspecter ses propriétés</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const linkProfileData = [
            {"domain": "mieuxrespirerenville.gouv.fr", "logo": "mieux-respirer en-ville.png"},
            {"domain": "verdirmaflotte.fr", "logo": "verdir-ma-flotte.png"},
            {"domain": "interlud.green", "logo": "interlud.png"},
            {"domain": "automobile-propre.com", "logo": "automobile-propre.png"},
            {"domain": "grandlyon.com", "logo": "metropole-grand-lyon.svg"},
            {"domain": "lachainelogistiquedufroid.fr", "logo": "la-chaine-logistique-du-froid.svg"},
            {"domain": "mixenn.bzh", "logo": "mixenn.svg"},
            {"domain": "observatoire-transports-bretagne.fr", "logo": "observatoire-regional-des-transports-de-bretagne.jpg"},
            {"domain": "squoltweser.blogspot.com", "logo": "squoltweser.png"},
            {"domain": "webwiki.fr", "logo": "webwiki.png"},
            {"domain": "auto-infos.fr", "logo": "auto-infos.png"},
            {"domain": "bye.fyi", "logo": "bye-fyi.png"},
            {"domain": "developpement-durable.gouv.fr", "logo": "ministere-de-la-transition-ecologique.svg"},
            {"domain": "directorylinkservice.com", "logo": "directory-link-service.png"},
            {"domain": "drjack.world", "logo": "drjack-world.png"},
            {"domain": "ecologie.gouv.fr", "logo": "ministere-de-la-transition-ecologique.svg"},
            {"domain": "garage-automobiles-versailles.fr", "logo": "garage-automobiles-versailles.png"},
            {"domain": "gaz-mobilite.fr", "logo": "gaz-mobilite-fr.png"},
            {"domain": "goooogla.com", "logo": "goooogla-directory.png"},
            {"domain": "institutparisregion.fr", "logo": "l-institut-paris-region.png"},
            {"domain": "logistique-grandest.fr", "logo": "portail-logistique-grand-est.png"},
            {"domain": "otre.org", "logo": "otre.svg"},
            {"domain": "presseagence.fr", "logo": "presse-agence.svg"},
            {"domain": "toplist.co.in", "logo": "toplist-co-in.png"},
            {"domain": "unostra.fr", "logo": "union-nationale-des-organisations-syndicales-des-transporteurs-routiers-automobiles.jpg"},
            {"domain": "backlinks-checker.com", "logo": "website-logo.png"},
            {"domain": "analyticshaven.top", "logo": "website-logo.png"},
            {"domain": "anchorurl.cloud", "logo": "website-logo.png"},
            {"domain": "atomizelink.icu", "logo": "website-logo.png"},
            {"domain": "blinks.monster", "logo": "website-logo.png"},
            {"domain": "buzzshrink.website", "logo": "website-logo.png"},
            {"domain": "ready.pro", "logo": "website-logo.png"},
            {"domain": "seodomains.website", "logo": "website-logo.png"},
            {"domain": "creativeposts.top", "logo": "website-logo.png"},
            {"domain": "knows.sbs", "logo": "website-logo.png"},
            {"domain": "takes.sbs", "logo": "website-logo.png"},
            {"domain": "knows.monster", "logo": "website-logo.png"},
            {"domain": "metamagic.top", "logo": "website-logo.png"},
            {"domain": "newlyregddomains.com", "logo": "website-logo.png"},
            {"domain": "seol.store", "logo": "website-logo.png"},
            {"domain": "sites.loseyourip.com", "logo": "website-logo.png"},
            {"domain": "factmags.com", "logo": "website-logo.png"},
            {"domain": "wants.cfd", "logo": "website-logo.png"}
        ];

        const partnersData = [
            {"domain": "mieuxrespirerenville.gouv.fr", "logo": "mieux-respirer en-ville.png"},
            {"domain": "verdirmaflotte.fr", "logo": "verdir-ma-flotte.png"},
            {"domain": "interlud.green", "logo": "interlud.png"},
            {"domain": "automobile-propre.com", "logo": "automobile-propre.png"},
            {"domain": "grandlyon.com", "logo": "metropole-grand-lyon.svg"},
            {"domain": "lachainelogistiquedufroid.fr", "logo": "la-chaine-logistique-du-froid.svg"},
            {"domain": "mixenn.bzh", "logo": "mixenn.svg"},
            {"domain": "observatoire-transports-bretagne.fr", "logo": "observatoire-regional-des-transports-de-bretagne.jpg"},
            {"domain": "auto-infos.fr", "logo": "auto-infos.png"},
            {"domain": "developpement-durable.gouv.fr", "logo": "ministere-de-la-transition-ecologique.svg"},
            {"domain": "ecologie.gouv.fr", "logo": "ministere-de-la-transition-ecologique.svg"},
            {"domain": "garage-automobiles-versailles.fr", "logo": "garage-automobiles-versailles.png"},
            {"domain": "gaz-mobilite.fr", "logo": "gaz-mobilite-fr.png"},
            {"domain": "institutparisregion.fr", "logo": "l-institut-paris-region.png"},
            {"domain": "logistique-grandest.fr", "logo": "portail-logistique-grand-est.png"},
            {"domain": "otre.org", "logo": "otre.svg"},
            {"domain": "presseagence.fr", "logo": "presse-agence.svg"},
            {"domain": "unostra.fr", "logo": "union-nationale-des-organisations-syndicales-des-transporteurs-routiers-automobiles.jpg"},
            {"domain": "logistic-low-carbon.green", "logo": "logistic-low-carbon.png"},
            {"domain": "cgf-grossistes.fr", "logo": "confederation-des-grossistes-de-france.png"},
            {"domain": "cerema.fr", "logo": "cerema.png"}
        ];

        let network = null;
        let globalNodesDataSet = null;
        let globalEdgesDataSet = null;
        let currentDatasetType = 'links';

        function initNetwork() {
            const container = document.getElementById('network-holder');
            const activeData = currentDatasetType === 'links' ? linkProfileData : partnersData;
            
            const nodes = [
                {
                    id: "central",
                    domainName: "rouler-o-vert.green",
                    label: "",
                    shape: "image",
                    image: "logos/rouler-o-vert.svg",
                    size: 90,
                    font: { color: '#00824A', size: 14, face: 'Public Sans', strokeWidth: 4, strokeColor: '#FFFFFF' }
                }
            ];
            
            const edges = [];

            activeData.forEach((item, index) => {
                const nodeId = `node_${index}`;
                nodes.push({
                    id: nodeId,
                    domainName: item.domain,
                    label: "",
                    shape: "image",
                    image: "logos/" + item.logo,
                    size: 35,
                    font: { color: '#111827', size: 12, face: 'Public Sans', strokeWidth: 3, strokeColor: '#FFFFFF' }
                });
                
                edges.push({
                    id: `edge_${nodeId}`,
                    from: nodeId,
                    to: "central",
                    arrows: { middle: { enabled: true, scaleFactor: 1.2 } },
                    color: { color: '#00824A', highlight: '#10B981' },
                    width: 1.5,
                    length: 550 + (index % 5) * 70
                });
            });

            globalNodesDataSet = new vis.DataSet(nodes);
            globalEdgesDataSet = new vis.DataSet(edges);

            const options = {
                physics: {
                    enabled: true,
                    barnesHut: {
                        gravitationalConstant: -25000,
                        centralGravity: 0,
                        springLength: 550,
                        springConstant: 0.05,
                        damping: 0.09,
                        avoidOverlap: 1
                    },
                    stabilization: { enabled: true, iterations: 2500 }
                },
                interaction: {
                    hover: true,
                    dragNodes: true,
                    zoomView: false,
                    dragView: true
                }
            };

            if (network !== null) {
                network.destroy();
                network = null;
            }

            network = new vis.Network(container, { nodes: globalNodesDataSet, edges: globalEdgesDataSet }, options);

            network.on("stabilizationIterationsDone", function () {
                network.setOptions({ physics: false });
            });

            document.getElementById('node-title').innerText = "Entité sélectionnée";
            document.getElementById('inspector-content').innerHTML = `
                <div class="text-muted" style="font-size: 0.85rem; font-style: italic;">Cliquez sur un nœud pour inspecter ses propriétés</div>`;

            network.on("click", function (params) {
                const allNodes = globalNodesDataSet.get();
                allNodes.forEach(n => { n.label = ""; });

                if (params.nodes.length === 0) {
                    globalNodesDataSet.update(allNodes);
                    document.getElementById('node-title').innerText = "Entité sélectionnée";
                    document.getElementById('inspector-content').innerHTML = `
                        <div class="text-muted" style="font-size: 0.85rem; font-style: italic;">Cliquez sur un nœud pour inspecter ses propriétés</div>`;
                    return;
                }

                const nodeId = params.nodes[0];
                const clickedNode = allNodes.find(n => n.id === nodeId);

                if (clickedNode) {
                    clickedNode.label = clickedNode.domainName;
                    globalNodesDataSet.update(clickedNode);

                    document.getElementById('node-title').innerText = "Entité : " + clickedNode.domainName;
                    const isCentral = nodeId === "central";
                    const nodeRole = isCentral ? "Nœud central (Cible)" : (currentDatasetType === 'links' ? "Nœud périphérique (Backlink)" : "Nœud périphérique (Partenaire)");
                    
                    document.getElementById('inspector-content').innerHTML = `
                        <div class="scalar-row">
                            <div class="scalar-key">Nom de domaine</div>
                            <div class="scalar-value">${clickedNode.domainName}</div>
                        </div>
                        <div class="scalar-row">
                            <div class="scalar-key">Fichier logo</div>
                            <div class="scalar-value">${clickedNode.image}</div>
                        </div>
                        <div class="scalar-row">
                            <div class="scalar-key">Type</div>
                            <div class="scalar-value">${nodeRole}</div>
                        </div>`;
                }
            });
        }

        function switchDataset(type) {
            currentDatasetType = type;
            document.querySelectorAll('.url-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.toggle-btn').forEach(el => el.classList.remove('active'));
            
            if(type === 'links') {
                document.getElementById('sidebar-links').classList.add('active');
                document.getElementById('btn-links').classList.add('active');
            } else {
                document.getElementById('sidebar-partners').classList.add('active');
                document.getElementById('btn-partners').classList.add('active');
            }
            initNetwork();
        }

        window.addEventListener("load", () => {
            initNetwork();

            const holder = document.getElementById('network-holder');
            holder.addEventListener('wheel', function (e) {
                e.preventDefault();
                if (!network) return;

                const oldScale = network.getScale();
                const zoomFactor = 1.12; // Modifiable pour ajuster la vitesse globale
                const newScale = e.deltaY < 0 ? oldScale * zoomFactor : oldScale / zoomFactor;

                // Limites de zoom
                if (newScale < 0.05 || newScale > 4) return;

                const rect = holder.getBoundingClientRect();
                const pointerCanvas = network.DOMtoCanvas({
                    x: e.clientX - rect.left,
                    y: e.clientY - rect.top
                });
                
                const currentCenter = network.getViewPosition();
                const newCenterX = pointerCanvas.x - (pointerCanvas.x - currentCenter.x) * (oldScale / newScale);
                const newCenterY = pointerCanvas.y - (pointerCanvas.y - currentCenter.y) * (oldScale / newScale);

                network.moveTo({
                    position: { x: newCenterX, y: newCenterY },
                    scale: newScale
                });
            }, { passive: false });
        });
    </script>
</body>
</html>
